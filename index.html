<html lang="en">

<meta name="description" content="A field at dusk. Move through it.">
<style>

html,body{width:100%;height:100%;overflow:hidden;background:#080a12}
canvas{position:fixed;inset:0;display:block}

  position:fixed;top:1.8rem;left:2rem;z-index:20;

<body>
<canvas id="c"></canvas>
<a id="back" href="https://hydrogenbondss.github.io/jeffreytse/">← Portfolio</a>
<div id="sig">Jeffrey N. Tse &nbsp;·&nbsp; 2026</div>

<script>
const C = document.getElementById('c');
const ctx = C.getContext('2d');
let W, H;
let frame = 0;
let mx = -1, my = -1;
let prevMx = -1, prevMy = -1;
let windForce = 0; // 0-1, cursor movement drives wind
let ambientWind = 0; // slow ambient breathing wind

// ── REEDS ──
const reeds = [];
const REED_COUNT = 120;

class Reed {
  constructor(x, z) {
    this.x = x;
    this.z = z; // 0=far, 1=close
    this.baseY = 0; // set on resize
    this.height = 0; // set on resize
    this.segments = 8;
    this.sway = 0;      // current sway angle
    this.swayVel = 0;   // sway velocity
    this.baseSway = 0;  // resting sway (slight randomness)
    this.thickness = 0;
    this.colorH = 38 + Math.random() * 18; // amber to gold range
    this.colorS = 35 + Math.random() * 25;
    this.colorL = 28 + Math.random() * 18;
    this.phase = Math.random() * Math.PI * 2; // for ambient sway
    this.headSize = 0;
    this.hasHead = Math.random() > 0.3; // cattail head
    this.headOffset = 0.72 + Math.random() * 0.15; // where head starts
  }

  init() {
    const zScale = 0.45 + this.z * 0.55;
    this.baseY = H * (0.68 + this.z * 0.08);
    this.height = (H * 0.28 + Math.random() * H * 0.14) * zScale;
    this.thickness = (1.2 + Math.random() * 2.2) * zScale;
    this.baseSway = (Math.random() - .5) * 0.06;
    this.headSize = (6 + Math.random() * 8) * zScale;
  }

  update() {
    const zScale = 0.45 + this.z * 0.55;
    // Ambient wind — slow sine
    ambientWind = Math.sin(frame * 0.008 + this.phase) * 0.12
                + Math.sin(frame * 0.021 + this.phase * 2) * 0.05;

    // Cursor wind — how close is cursor horizontally
    let cursorWind = 0;
    if(mx > 0) {
      const dx = mx - this.x;
      const influence = Math.max(0, 1 - Math.abs(dx) / (W * 0.18));
      // Wind direction based on cursor movement
      const windDir = (mx - prevMx) * 0.003;
      cursorWind = influence * windForce * 0.8 * Math.sign(windDir || 1);
    }

    const targetSway = this.baseSway + ambientWind + cursorWind;
    const spring = (targetSway - this.sway) * 0.04;
    this.swayVel += spring;
    this.swayVel *= 0.88; // damping
    this.sway += this.swayVel;
    this.sway = Math.max(-0.45, Math.min(0.45, this.sway));
  }

  draw(timeOfDay, fogAlpha) {
    const zScale = 0.45 + this.z * 0.55;
    const fog = fogAlpha * (1 - this.z * 0.7);

    // Light direction — sun is low and to the right at dusk
    const lightAngle = -0.4; // radians from vertical
    const lightIntensity = 0.6 + this.z * 0.3;

    // Color shifts with time of day
    const h = this.colorH + timeOfDay.hueShift;
    const s = this.colorS + timeOfDay.satShift;
    const l = this.colorL + timeOfDay.lightShift;

    ctx.save();
    ctx.translate(this.x, this.baseY);

    // Draw stalk segment by segment with bezier curve
    const totalSway = this.sway * this.height;
    ctx.beginPath();
    ctx.moveTo(0, 0);

    // Control points for natural reed curve
    const cp1x = totalSway * 0.2;
    const cp1y = -this.height * 0.4;
    const cp2x = totalSway * 0.65;
    const cp2y = -this.height * 0.75;
    const endX = totalSway;
    const endY = -this.height;

    ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, endX, endY);

    // Stalk gradient — backlit at dusk
    const stalkGrad = ctx.createLinearGradient(
      -this.thickness, 0, this.thickness * 2, -this.height
    );

    // Backlit: bright edge toward light source, dark body
    stalkGrad.addColorStop(0, `hsla(${h},${s}%,${l*0.6}%,${0.9 - fog})`);
    stalkGrad.addColorStop(0.3, `hsla(${h+8},${s+10}%,${l+15}%,${0.95 - fog})`);
    stalkGrad.addColorStop(0.7, `hsla(${h},${s}%,${l}%,${0.85 - fog})`);
    stalkGrad.addColorStop(1, `hsla(${h-5},${s-8}%,${l+8}%,${0.9 - fog})`);

    ctx.strokeStyle = stalkGrad;
    ctx.lineWidth = this.thickness;
    ctx.lineCap = 'round';
    ctx.stroke();

    // Backlit rim light (golden edge)
    if(this.z > 0.4 && timeOfDay.rimLight > 0) {
      ctx.beginPath();
      ctx.moveTo(this.thickness * 0.4, 0);
      ctx.bezierCurveTo(
        cp1x + this.thickness * 0.5, cp1y,
        cp2x + this.thickness * 0.4, cp2y,
        endX + this.thickness * 0.3, endY
      );
      ctx.strokeStyle = `hsla(42,88%,68%,${timeOfDay.rimLight * this.z * 0.6})`;
      ctx.lineWidth = this.thickness * 0.35;
      ctx.stroke();
    }

    // Cattail head
    if(this.hasHead) {
      const headX = endX * this.headOffset + cp2x * (1 - this.headOffset);
      const headY = endY * this.headOffset + cp2y * (1 - this.headOffset);

      // Elongated cattail shape
      const hh = this.headSize * 2.2;
      const hw = this.headSize * 0.38;

      ctx.beginPath();
      ctx.ellipse(
        headX, headY - hh * 0.5,
        hw * zScale, hh * 0.5,
        this.sway * 0.3, 0, Math.PI * 2
      );

      const headGrad = ctx.createLinearGradient(
        headX - hw, headY - hh,
        headX + hw * 1.5, headY
      );
      headGrad.addColorStop(0, `hsla(22,52%,24%,${0.92 - fog})`);
      headGrad.addColorStop(0.4, `hsla(28,58%,32%,${0.95 - fog})`);
      headGrad.addColorStop(1, `hsla(32,48%,22%,${0.85 - fog})`);
      ctx.fillStyle = headGrad;
      ctx.fill();

      // Rim on head
      if(timeOfDay.rimLight > 0.3) {
        ctx.beginPath();
        ctx.ellipse(headX + hw * 0.5, headY - hh * 0.5, hw * 0.2 * zScale, hh * 0.48, this.sway * 0.3, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(42,80%,62%,${timeOfDay.rimLight * 0.35})`;
        ctx.fill();
      }
    }

    ctx.restore();
  }
}

// ── RAIN ──
const rainDrops = [];
let isRaining = false;
let rainTimer = 0;
let rainDuration = 0;
let rainAngle = 0.15;

class RainDrop {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random() * W * 1.3 - W * 0.15;
    this.y = Math.random() * H * 0.5 - H * 0.1;
    this.len = 12 + Math.random() * 18;
    this.speed = 14 + Math.random() * 8;
    this.alpha = 0.15 + Math.random() * 0.2;
  }
  update() {
    this.x += Math.sin(rainAngle) * this.speed * 0.4;
    this.y += this.speed;
    if(this.y > H + 20) this.reset();
  }
  draw() {
    ctx.beginPath();
    ctx.moveTo(this.x, this.y);
    ctx.lineTo(this.x + Math.sin(rainAngle) * this.len * 0.4, this.y + this.len);
    ctx.strokeStyle = `rgba(180,200,230,${this.alpha})`;
    ctx.lineWidth = 0.8;
    ctx.stroke();
  }
}

// ── FIREFLIES ──
const fireflies = [];
class Firefly {
  constructor() {
    this.x = Math.random() * W;
    this.y = H * 0.3 + Math.random() * H * 0.4;
    this.vx = (Math.random() - .5) * 0.6;
    this.vy = (Math.random() - .5) * 0.4;
    this.phase = Math.random() * Math.PI * 2;
    this.pulseSpeed = 0.03 + Math.random() * 0.04;
    this.size = 1.5 + Math.random() * 1.5;
  }
  update() {
    this.phase += this.pulseSpeed;
    this.vx += (Math.random() - .5) * 0.06;
    this.vy += (Math.random() - .5) * 0.04;
    this.vx *= 0.98; this.vy *= 0.98;
    this.x += this.vx; this.y += this.vy;
    if(this.x < 0) this.x = W;
    if(this.x > W) this.x = 0;
    if(this.y < H * 0.2) this.vy += 0.04;
    if(this.y > H * 0.8) this.vy -= 0.04;
  }
  draw(alpha) {
    const glow = Math.max(0, Math.sin(this.phase)) * alpha;
    if(glow < 0.05) return;
    const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 8);
    g.addColorStop(0, `rgba(180,255,120,${glow * 0.9})`);
    g.addColorStop(0.3, `rgba(160,240,100,${glow * 0.4})`);
    g.addColorStop(1, `rgba(140,220,80,0)`);
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = `rgba(220,255,180,${glow})`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ── MYCELIUM ──
const myceliumLines = [];
let myceliumTimer = 0;
let stillTimer = 0; // how long cursor has been still

// ── TIME OF DAY ──
function getTimeOfDay() {
  const h = new Date().getHours();
  const min = new Date().getMinutes();
  const t = h + min / 60;

  // Always render as dusk (18-21) but shift slightly based on real hour
  // This makes it always feel like the right time to be here
  const dusk = {
    skyTop: [220, 45, 12],    // deep violet-blue
    skyMid: [18, 62, 28],     // warm amber horizon
    skyBot: [12, 55, 42],     // orange-peach at horizon
    groundH: 28, groundS: 38, groundL: 8,
    fogColor: [180, 140, 100],
    fogAlpha: 0.18,
    hueShift: 0,
    satShift: 0,
    lightShift: 0,
    rimLight: 0.85,
    fireflyAlpha: 0,
    starAlpha: 0,
  };

  // Modulate based on actual hour
  if(t >= 20 || t < 5) {
    // Night — deep and still
    return {
      ...dusk,
      skyTop: [230, 35, 8],
      skyMid: [225, 28, 12],
      skyBot: [220, 22, 18],
      fogAlpha: 0.28,
      hueShift: 15,
      satShift: -12,
      lightShift: -8,
      rimLight: 0.2,
      fireflyAlpha: 0.9,
      starAlpha: 0.7,
    };
  } else if(t >= 17 && t < 20) {
    // Dusk — most beautiful
    const progress = (t - 17) / 3;
    return {
      ...dusk,
      rimLight: 0.9 - progress * 0.6,
      fireflyAlpha: progress * 0.7,
      starAlpha: progress * 0.3,
    };
  } else if(t >= 5 && t < 9) {
    // Dawn
    return {
      ...dusk,
      skyTop: [200, 40, 10],
      skyMid: [20, 70, 35],
      skyBot: [30, 65, 55],
      rimLight: 0.6,
      hueShift: -8,
      lightShift: 5,
    };
  } else {
    // Daytime — still render as dusk for consistency
    return dusk;
  }
}

// ── STARS ──
const stars = Array.from({length: 160}, () => ({
  x: Math.random(), y: Math.random() * 0.6,
  s: 0.3 + Math.random() * 1.2,
  tw: Math.random() * Math.PI * 2,
}));

// ── AUDIO ──
let audioCtx, windGain, rainGain, cricketGain, masterGain;
let audioReady = false;

function initAudio() {
  if(audioReady) return;
  audioReady = true;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0;
    masterGain.connect(audioCtx.destination);

    const rate = audioCtx.sampleRate;

    // Brown noise for wind
    const bufLen = rate * 4;
    function makeBrownNoise() {
      const buf = audioCtx.createBuffer(1, bufLen, rate);
      const d = buf.getChannelData(0);
      let last = 0;
      for(let i = 0; i < bufLen; i++) {
        const w = Math.random() * 2 - 1;
        last = (last + 0.02 * w) / 1.02;
        d[i] = last * 3.5;
      }
      return buf;
    }
    function makeWhiteNoise() {
      const buf = audioCtx.createBuffer(1, bufLen, rate);
      const d = buf.getChannelData(0);
      for(let i = 0; i < bufLen; i++) d[i] = Math.random() * 2 - 1;
      return buf;
    }

    // Wind — brown noise, lowpass filtered
    const windSrc = audioCtx.createBufferSource();
    windSrc.buffer = makeBrownNoise();
    windSrc.loop = true;
    const windFilt = audioCtx.createBiquadFilter();
    windFilt.type = 'lowpass';
    windFilt.frequency.value = 320;
    windGain = audioCtx.createGain();
    windGain.gain.value = 0.08;
    windSrc.connect(windFilt);
    windFilt.connect(windGain);
    windGain.connect(masterGain);
    windSrc.start();

    // Rain — white noise, bandpass
    const rainSrc = audioCtx.createBufferSource();
    rainSrc.buffer = makeWhiteNoise();
    rainSrc.loop = true;
    const rainFilt = audioCtx.createBiquadFilter();
    rainFilt.type = 'bandpass';
    rainFilt.frequency.value = 800;
    rainFilt.Q.value = 0.6;
    rainGain = audioCtx.createGain();
    rainGain.gain.value = 0;
    rainSrc.connect(rainFilt);
    rainFilt.connect(rainGain);
    rainGain.connect(masterGain);
    rainSrc.start();

    // Crickets / insects — high freq filtered noise
    const cricketSrc = audioCtx.createBufferSource();
    cricketSrc.buffer = makeWhiteNoise();
    cricketSrc.loop = true;
    const cf1 = audioCtx.createBiquadFilter();
    cf1.type = 'bandpass'; cf1.frequency.value = 4200; cf1.Q.value = 12;
    const cf2 = audioCtx.createBiquadFilter();
    cf2.type = 'bandpass'; cf2.frequency.value = 6800; cf2.Q.value = 8;
    cricketGain = audioCtx.createGain();
    cricketGain.gain.value = 0;
    cricketSrc.connect(cf1); cf1.connect(cricketGain);
    cricketSrc.connect(cf2); cf2.connect(cricketGain);
    cricketGain.connect(masterGain);
    cricketSrc.start();

    // Fade in
    masterGain.gain.setTargetAtTime(0.7, audioCtx.currentTime, 1.5);

  } catch(e) {}
}

document.addEventListener('click', initAudio, { once: true });
document.addEventListener('touchstart', initAudio, { once: true });
setTimeout(initAudio, 800);

// ── RESIZE ──
function resize() {
  W = C.width = window.innerWidth;
  H = C.height = window.innerHeight;
  reeds.forEach(r => r.init());
  // Reset firefly positions
  fireflies.forEach(f => {
    f.x = Math.random() * W;
    f.y = H * 0.3 + Math.random() * H * 0.4;
  });
}
window.addEventListener('resize', resize);

// ── DRAW SKY ──
function drawSky(tod) {
  // Multi-stop gradient for dusk depth
  const g = ctx.createLinearGradient(0, 0, 0, H * 0.72);
  g.addColorStop(0, `hsl(${tod.skyTop[0]},${tod.skyTop[1]}%,${tod.skyTop[2]}%)`);
  g.addColorStop(0.45, `hsl(${tod.skyMid[0]},${tod.skyMid[1]}%,${tod.skyMid[2]}%)`);
  g.addColorStop(0.82, `hsl(${tod.skyBot[0]},${tod.skyBot[1]}%,${tod.skyBot[2]}%)`);
  g.addColorStop(1, `hsl(${tod.groundH},${tod.groundS}%,${tod.groundL}%)`);
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
}

// ── DRAW SUN/GLOW ──
function drawHorizonGlow(tod) {
  if(tod.rimLight < 0.1) return;
  const sunX = W * 0.72;
  const sunY = H * 0.62;
  const g = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, H * 0.55);
  g.addColorStop(0, `rgba(255,200,100,${tod.rimLight * 0.35})`);
  g.addColorStop(0.3, `rgba(255,140,60,${tod.rimLight * 0.18})`);
  g.addColorStop(0.7, `rgba(200,80,40,${tod.rimLight * 0.06})`);
  g.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
}

// ── DRAW GROUND ──
function drawGround(tod) {
  const groundY = H * 0.72;
  const g = ctx.createLinearGradient(0, groundY, 0, H);
  g.addColorStop(0, `hsl(${tod.groundH},${tod.groundS}%,${tod.groundL + 4}%)`);
  g.addColorStop(0.4, `hsl(${tod.groundH},${tod.groundS + 5}%,${tod.groundL}%)`);
  g.addColorStop(1, `hsl(${tod.groundH},${tod.groundS + 8}%,${tod.groundL - 4}%)`);
  ctx.fillStyle = g;
  ctx.fillRect(0, groundY, W, H - groundY);

  // Ground fog / atmosphere
  if(tod.fogAlpha > 0) {
    const fg = ctx.createLinearGradient(0, groundY - H * 0.08, 0, groundY + H * 0.15);
    fg.addColorStop(0, 'rgba(0,0,0,0)');
    fg.addColorStop(0.5, `rgba(${tod.fogColor[0]},${tod.fogColor[1]},${tod.fogColor[2]},${tod.fogAlpha * 0.4})`);
    fg.addColorStop(1, `rgba(${tod.fogColor[0]},${tod.fogColor[1]},${tod.fogColor[2]},${tod.fogAlpha})`);
    ctx.fillStyle = fg;
    ctx.fillRect(0, groundY - H * 0.08, W, H * 0.23);
  }
}

// ── DRAW STARS ──
function drawStars(tod) {
  if(tod.starAlpha < 0.05) return;
  const t = frame * 0.001;
  stars.forEach(s => {
    const twinkle = 0.5 + Math.sin(t * 1.3 + s.tw) * 0.5;
    ctx.fillStyle = `rgba(255,255,255,${tod.starAlpha * twinkle})`;
    ctx.beginPath();
    ctx.arc(s.x * W, s.y * H, s.s * 0.6, 0, Math.PI * 2);
    ctx.fill();
  });
}

// ── DRAW REFLECTION ──
function drawGroundReflection(tod) {
  if(tod.rimLight < 0.3) return;
  const groundY = H * 0.72;
  // Subtle warm reflection on wet ground
  const refGrad = ctx.createLinearGradient(W * 0.55, groundY, W * 0.9, groundY + H * 0.08);
  refGrad.addColorStop(0, `rgba(255,180,80,${tod.rimLight * 0.12})`);
  refGrad.addColorStop(1, 'rgba(255,180,80,0)');
  ctx.fillStyle = refGrad;
  ctx.fillRect(W * 0.4, groundY, W * 0.6, H * 0.1);
}

// ── MYCELIUM ──
function updateMycelium() {
  myceliumTimer++;
  if(myceliumTimer % 90 !== 0) return;
  myceliumLines.length = 0;

  // Connect nearby reeds with faint threads — only at night/dusk
  const tod = getTimeOfDay();
  if(tod.rimLight > 0.7) return; // too bright

  for(let i = 0; i < reeds.length; i++) {
    for(let j = i + 1; j < reeds.length; j++) {
      const a = reeds[i], b = reeds[j];
      const d = Math.abs(a.x - b.x);
      if(d < W * 0.06 && Math.abs(a.z - b.z) < 0.2) {
        const alpha = (1 - d / (W * 0.06)) * 0.18 * (1 - tod.rimLight);
        myceliumLines.push({ x1: a.x, y1: a.baseY, x2: b.x, y2: b.baseY, alpha });
      }
    }
  }
}

function drawMycelium() {
  if(stillTimer < 180 || myceliumLines.length === 0) return; // only visible when still for 3s
  const fadeIn = Math.min(1, (stillTimer - 180) / 120);
  const t = frame * 0.003;
  myceliumLines.forEach(ln => {
    const pulse = 0.6 + Math.sin(t + ln.x1 * 0.01) * 0.4;
    ctx.beginPath();
    ctx.moveTo(ln.x1, ln.y1);
    // Slight curve
    const mx = (ln.x1 + ln.x2) / 2;
    const my = (ln.y1 + ln.y2) / 2 - 8;
    ctx.quadraticCurveTo(mx, my, ln.x2, ln.y2);
    ctx.strokeStyle = `rgba(140,220,160,${ln.alpha * pulse * fadeIn})`;
    ctx.lineWidth = 0.7;
    ctx.stroke();
  });
}

// ── MAIN LOOP ──
function render() {
  frame++;

  const tod = getTimeOfDay();

  // Clear
  ctx.clearRect(0, 0, W, H);

  // Sky layers
  drawSky(tod);
  drawStars(tod);
  drawHorizonGlow(tod);

  // Rain
  if(isRaining) {
    reeds.sort(() => 0); // keep order
    rainDrops.forEach(r => { r.update(); r.draw(); });
  }

  // Ground
  drawGround(tod);
  drawGroundReflection(tod);

  // Mycelium (underground, near base of reeds)
  drawMycelium();

  // Reeds — sorted by z (far to close)
  reeds.forEach(r => { r.update(); r.draw(tod, tod.fogAlpha); });

  // Fireflies (only at dusk/night)
  if(tod.fireflyAlpha > 0.1) {
    fireflies.forEach(f => { f.update(); f.draw(tod.fireflyAlpha); });
  }

  // Cursor light pool — very subtle
  if(mx > 0) {
    const cg = ctx.createRadialGradient(mx, my, 0, mx, my, 80);
    cg.addColorStop(0, 'rgba(255,220,160,0.04)');
    cg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = cg;
    ctx.fillRect(0, 0, W, H);
  }

  // Vignette
  const vig = ctx.createRadialGradient(W/2, H/2, H * 0.25, W/2, H/2, H * 0.9);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(0,0,0,0.55)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, W, H);

  // Film grain
  if(frame % 3 === 0) {
    for(let i = 0; i < 800; i++) {
      const gx = Math.random() * W;
      const gy = Math.random() * H;
      const ga = Math.random() * 0.028;
      ctx.fillStyle = `rgba(255,255,255,${ga})`;
      ctx.fillRect(gx, gy, 1, 1);
    }
  }

  // Wind decay
  windForce *= 0.95;

  // Still timer
  const moved = Math.abs(mx - prevMx) + Math.abs(my - prevMy);
  if(moved < 2 && mx > 0) {
    stillTimer++;
  } else {
    stillTimer = Math.max(0, stillTimer - 3);
  }
  prevMx = mx; prevMy = my;

  // Rain timer
  rainTimer++;
  if(!isRaining && rainTimer > 600 + Math.random() * 1800) {
    isRaining = true;
    rainDuration = 200 + Math.random() * 400;
    rainTimer = 0;
    rainAngle = 0.1 + Math.random() * 0.15;
    while(rainDrops.length < 180) rainDrops.push(new RainDrop());
  }
  if(isRaining && rainTimer > rainDuration) {
    isRaining = false;
    rainTimer = 0;
    rainDrops.length = 0;
  }

  // Mycelium
  updateMycelium();

  // Audio update
  if(audioReady && audioCtx) {
    const t = audioCtx.currentTime;
    const windLevel = 0.06 + windForce * 0.14 + Math.abs(ambientWind) * 0.08;
    windGain && windGain.gain.setTargetAtTime(windLevel, t, 0.4);
    rainGain && rainGain.gain.setTargetAtTime(isRaining ? 0.18 : 0, t, 0.8);
    cricketGain && cricketGain.gain.setTargetAtTime(tod.fireflyAlpha * 0.04, t, 2.0);
  }

  requestAnimationFrame(render);
}

// ── INIT ──
function init() {
  // Create reeds with z-depth distribution
  reeds.length = 0;
  // Far layer (z=0-0.3)
  for(let i = 0; i < REED_COUNT * 0.35; i++) {
    const r = new Reed(Math.random() * W, Math.random() * 0.3);
    reeds.push(r);
  }
  // Mid layer (z=0.3-0.65)
  for(let i = 0; i < REED_COUNT * 0.4; i++) {
    const r = new Reed(Math.random() * W, 0.3 + Math.random() * 0.35);
    reeds.push(r);
  }
  // Close layer (z=0.65-1)
  for(let i = 0; i < REED_COUNT * 0.25; i++) {
    const r = new Reed(Math.random() * W, 0.65 + Math.random() * 0.35);
    reeds.push(r);
  }
  // Sort far to close
  reeds.sort((a, b) => a.z - b.z);

  // Fireflies
  fireflies.length = 0;
  for(let i = 0; i < 22; i++) fireflies.push(new Firefly());

  resize();
  render();
}

// ── EVENTS ──
document.addEventListener('mousemove', e => {
  const speed = Math.hypot(e.clientX - mx, e.clientY - my);
  windForce = Math.min(1, windForce + speed * 0.003);
  mx = e.clientX;
  my = e.clientY;
});
document.addEventListener('touchmove', e => {
  const t = e.touches[0];
  const speed = Math.hypot(t.clientX - mx, t.clientY - my);
  windForce = Math.min(1, windForce + speed * 0.003);
  mx = t.clientX;
  my = t.clientY;
  e.preventDefault();
}, { passive: false });

init();
</script>
