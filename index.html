<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garden of Returning</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:#0a0e0a; }
canvas { display:block; position:fixed; inset:0; }

#ui {
  position:fixed; inset:0; pointer-events:none; z-index:10;
  display:flex; flex-direction:column; justify-content:space-between;
  padding:2rem;
}
.ui-top {
  display:flex; justify-content:space-between; align-items:flex-start;
}
.ui-title {
  font-family:'Courier New',monospace; font-size:.58rem; letter-spacing:.25em;
  text-transform:uppercase; color:rgba(140,190,120,.45);
  line-height:1.8;
}
.ui-coords {
  font-family:'Courier New',monospace; font-size:.52rem; letter-spacing:.12em;
  color:rgba(140,190,120,.3); text-align:right;
}
.ui-bottom {
  display:flex; justify-content:space-between; align-items:flex-end;
}
.ui-hint {
  font-family:'Courier New',monospace; font-size:.48rem; letter-spacing:.18em;
  color:rgba(140,190,120,.25); text-transform:uppercase;
  animation: hintpulse 3s ease-in-out infinite;
}
@keyframes hintpulse { 0%,100%{opacity:.25} 50%{opacity:.55} }
.ui-year {
  font-family:'Courier New',monospace; font-size:.48rem; color:rgba(140,190,120,.18);
}

/* Sound toggle */
#soundBtn {
  position:fixed; top:2rem; right:2rem; z-index:20;
  background:rgba(10,14,10,.7); border:1px solid rgba(140,190,120,.2);
  color:rgba(140,190,120,.5); font-family:'Courier New',monospace;
  font-size:.5rem; letter-spacing:.15em; padding:.4rem .8rem;
  cursor:pointer; pointer-events:all; transition:all .3s; text-transform:uppercase;
}
#soundBtn:hover { border-color:rgba(140,190,120,.5); color:rgba(140,190,120,.9); }

/* Loading */
#loading {
  position:fixed; inset:0; background:#0a0e0a; z-index:50;
  display:flex; align-items:center; justify-content:center; flex-direction:column;
  gap:1.5rem;
}
.ld-text { font-family:'Courier New',monospace; font-size:.58rem; letter-spacing:.25em;
  color:rgba(140,190,120,.45); text-transform:uppercase; }
.ld-bar { width:200px; height:1px; background:rgba(140,190,120,.1); }
.ld-fill { height:100%; width:0%; background:rgba(140,190,120,.6); transition:width .3s ease; }
#loading.out { opacity:0; transition:opacity 1.5s ease; pointer-events:none; }
</style>
</head>
<body>

<div id="loading">
  <div class="ld-text">Garden of Returning</div>
  <div class="ld-bar"><div class="ld-fill" id="ldFill"></div></div>
  <div class="ld-text" id="ldStatus" style="font-size:.42rem;opacity:.5">Rendering city</div>
</div>

<canvas id="c"></canvas>

<div id="ui">
  <div class="ui-top">
    <div class="ui-title">Garden of Returning<br>An Overgrown City</div>
    <div class="ui-coords" id="coords">22.3193° N<br>114.1694° E</div>
  </div>
  <div class="ui-bottom">
    <div class="ui-hint" id="hint">Move cursor to explore — scroll to advance</div>
    <div class="ui-year">After</div>
  </div>
</div>

<button id="soundBtn">Sound off</button>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H, DPR;
function resize() {
  DPR = window.devicePixelRatio || 1;
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * DPR; canvas.height = H * DPR;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.scale(DPR, DPR);
  buildScene();
}

// ── STATE ──────────────────────────────────────────────────────────────────
let mx = 0.5, my = 0.5; // normalised mouse
let scrollX = 0, targetScrollX = 0;
let scrollY = 0, targetScrollY = 0;
let time = 0;
let audioCtx = null, soundOn = false;
let windGain, ambientGain;

// ── CITY GEOMETRY ──────────────────────────────────────────────────────────
let buildings = [];
let vines = [];
let debris = [];
let windows_ = [];
let plants = [];
let cracks = [];

const WORLD_W = W * 3;

function rng(seed) {
  let s = seed;
  return function() {
    s = (s * 1664525 + 1013904223) & 0xFFFFFFFF;
    return (s >>> 0) / 0xFFFFFFFF;
  };
}

function buildScene() {
  const r = rng(42);
  buildings = [];
  vines = [];
  debris = [];
  windows_ = [];
  plants = [];

  const totalW = W * 4; // wide scrollable world
  const groundY = H * 0.72;

  // ── BUILDINGS ──
  let x = -W * 0.2;
  while (x < totalW) {
    const bw = 60 + r() * 160;
    const bh = 80 + r() * (H * 0.55);
    const by = groundY - bh;
    const damage = r() < 0.25; // 25% of buildings are damaged
    const col = damage
      ? `hsl(${20 + r()*20},${5+r()*8}%,${8+r()*10}%)`
      : `hsl(${200 + r()*30},${3+r()*6}%,${10+r()*14}%)`;

    buildings.push({ x, y: by, w: bw, h: bh, col, damage,
      overgrown: r() > 0.3, // most buildings have plant growth
      crack: r() > 0.5,
      floors: Math.floor(3 + r() * 15)
    });

    // Windows for this building
    if (!damage) {
      const cols = Math.floor(bw / 18);
      const rows = Math.floor(bh / 22);
      for (let wr = 0; wr < rows; wr++) {
        for (let wc = 0; wc < cols; wc++) {
          if (r() < 0.7) {
            windows_.push({
              x: x + 8 + wc * 18 + r() * 3,
              y: by + 10 + wr * 22 + r() * 3,
              w: 10 + r() * 6, h: 14 + r() * 6,
              broken: r() > 0.6,
              dark: r() > 0.3
            });
          }
        }
      }
    }

    // Gap between buildings
    x += bw + (r() < 0.2 ? 40 + r() * 60 : 2 + r() * 8);
  }

  // ── VINES DRAPED ON BUILDINGS ──
  buildings.forEach((b, i) => {
    if (!b.overgrown) return;
    const numVines = 2 + Math.floor(rng(i * 7)() * 6);
    for (let v = 0; v < numVines; v++) {
      const vr = rng(i * 13 + v);
      const startX = b.x + vr() * b.w;
      const startY = b.y + vr() * (b.h * 0.4); // starts somewhere on upper building
      const length = 40 + vr() * (b.h * 0.7);
      vines.push({
        x: startX, y: startY, length,
        sway: vr() * Math.PI * 2,
        swayAmp: 4 + vr() * 12,
        segments: Math.floor(8 + vr() * 16),
        col: `hsl(${100 + vr()*30},${40+vr()*30}%,${18+vr()*15}%)`
      });
    }
  });

  // ── GROUND PLANTS ──
  for (let i = 0; i < 200; i++) {
    const pr = rng(i * 19 + 3);
    plants.push({
      x: pr() * totalW,
      y: groundY + pr() * (H * 0.05),
      size: 8 + pr() * 40,
      type: Math.floor(pr() * 3), // 0=grass, 1=bush, 2=tall weed
      sway: pr() * Math.PI * 2,
      col: `hsl(${95 + pr()*40},${35+pr()*30}%,${15+pr()*20}%)`
    });
  }

  // ── STREET DEBRIS ──
  for (let i = 0; i < 80; i++) {
    const dr = rng(i * 31 + 7);
    debris.push({
      x: dr() * totalW,
      y: groundY + dr() * (H * 0.04),
      w: 5 + dr() * 40, h: 3 + dr() * 20,
      col: `hsl(${20+dr()*30},${3+dr()*8}%,${10+dr()*12}%)`,
      rot: dr() * Math.PI
    });
  }
}

// ── PARALLAX LAYERS ────────────────────────────────────────────────────────
const PARALLAX = {
  sky:      0.0,
  clouds:   0.05,
  farBuild: 0.15,
  midBuild: 0.35,
  nearBuild:0.7,
  ground:   1.0,
  fg:       1.3
};

// ── DRAWING ────────────────────────────────────────────────────────────────
function drawSky() {
  // Dark, overcast post-apocalyptic sky
  const grad = ctx.createLinearGradient(0, 0, 0, H * 0.75);
  grad.addColorStop(0,   '#070a07');
  grad.addColorStop(0.3, '#0c120c');
  grad.addColorStop(0.65,'#111a10');
  grad.addColorStop(1,   '#0a1109');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Sickly light through clouds — teal/yellow horizon
  const horizGrad = ctx.createRadialGradient(W*0.4, H*0.6, 0, W*0.4, H*0.6, W*0.5);
  horizGrad.addColorStop(0,   'rgba(60,90,50,.12)');
  horizGrad.addColorStop(0.5, 'rgba(40,70,40,.06)');
  horizGrad.addColorStop(1,   'transparent');
  ctx.fillStyle = horizGrad;
  ctx.fillRect(0, 0, W, H);
}

function drawClouds(camX) {
  // Low heavy clouds, drift slowly
  const cloudData = [
    {x:0.1, y:0.08, w:0.35, h:0.12},
    {x:0.4, y:0.04, w:0.28, h:0.10},
    {x:0.62,y:0.11, w:0.42, h:0.14},
    {x:0.85,y:0.06, w:0.30, h:0.09},
  ];
  cloudData.forEach(c => {
    const cx = (c.x * W * 3 - camX * PARALLAX.clouds) % (W * 3);
    const grad = ctx.createRadialGradient(cx + c.w*W*0.5, c.y*H + c.h*H*0.5, 0, cx + c.w*W*0.5, c.y*H, c.w*W*0.7);
    grad.addColorStop(0, 'rgba(25,35,25,.75)');
    grad.addColorStop(0.5,'rgba(20,28,20,.5)');
    grad.addColorStop(1,  'transparent');
    ctx.fillStyle = grad;
    ctx.fillRect(cx, c.y*H - 20, c.w * W, c.h * H + 20);
  });
}

function drawBuildings(camX, camY) {
  const groundY = H * 0.72 - camY * 0.1;

  buildings.forEach(b => {
    // Two layers of buildings with parallax
    const isFar = buildings.indexOf(b) % 3 === 0;
    const parallax = isFar ? PARALLAX.farBuild : PARALLAX.midBuild;
    const bx = b.x - camX * parallax;

    if (bx > W + 200 || bx + b.w < -200) return; // cull

    const by = groundY - b.h;

    // Building body
    ctx.fillStyle = b.col;
    ctx.fillRect(bx, by, b.w, b.h + 20);

    // Floor lines (subtle structure)
    if (b.floors > 0 && !b.damage) {
      ctx.strokeStyle = 'rgba(0,0,0,.3)';
      ctx.lineWidth = 0.5;
      const floorH = b.h / b.floors;
      for (let f = 1; f < b.floors; f++) {
        ctx.beginPath();
        ctx.moveTo(bx, by + f * floorH);
        ctx.lineTo(bx + b.w, by + f * floorH);
        ctx.stroke();
      }
    }

    // Damage — jagged top
    if (b.damage) {
      ctx.fillStyle = '#0a0e0a';
      const pts = [];
      let dx = bx;
      while (dx < bx + b.w) {
        pts.push({x: dx, y: by + (Math.random() < 0.4 ? -(5 + Math.random()*30) : 0)});
        dx += 8 + Math.random() * 15;
      }
      ctx.beginPath();
      ctx.moveTo(bx, by - 40);
      pts.forEach(p => ctx.lineTo(p.x, p.y));
      ctx.lineTo(bx + b.w, by - 40);
      ctx.closePath();
      ctx.fill();
    }

    // Vine tendrils on building face
    if (b.overgrown) {
      for (let v = 0; v < 3; v++) {
        const vx = bx + b.w * (0.1 + v * 0.35);
        const vy = by + b.h * 0.15;
        const vl = b.h * (0.3 + Math.sin(time * 0.3 + v) * 0.05);
        ctx.strokeStyle = `hsla(${110 + v*15},40%,${15+v*5}%,.6)`;
        ctx.lineWidth = 1 + v * 0.5;
        ctx.beginPath();
        ctx.moveTo(vx, vy);
        for (let s = 0; s < 8; s++) {
          const sy = vy + (s/8) * vl;
          const sx = vx + Math.sin(time * 0.4 + s * 0.8 + v * 2) * (4 + s * 1.5);
          ctx.lineTo(sx, sy);
        }
        ctx.stroke();

        // Leaves
        for (let l = 2; l < 7; l++) {
          const lx = vx + Math.sin(time * 0.4 + l * 0.8 + v * 2) * (4 + l * 1.5);
          const ly = vy + (l/8) * vl;
          drawLeaf(lx, ly, 4 + l * 0.5, time + v + l, 110 + v*15);
        }
      }
    }
  });
}

function drawLeaf(x, y, size, phase, hue) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(Math.sin(time * 0.5 + phase) * 0.15 + phase * 0.3);
  ctx.beginPath();
  ctx.ellipse(0, 0, size, size * 0.5, 0, 0, Math.PI * 2);
  ctx.fillStyle = `hsla(${hue},${40+Math.sin(phase)*10}%,${18+Math.sin(phase*0.7)*5}%,.7)`;
  ctx.fill();
  ctx.restore();
}

function drawWindows(camX) {
  const groundY = H * 0.72;
  windows_.forEach(win => {
    const wx = win.x - camX * PARALLAX.midBuild;
    if (wx > W + 50 || wx + win.w < -50) return;

    if (win.broken) {
      // Broken window — jagged dark
      ctx.fillStyle = 'rgba(0,0,0,.8)';
      ctx.fillRect(wx, win.y, win.w, win.h);
      ctx.strokeStyle = 'rgba(80,100,80,.3)';
      ctx.lineWidth = 0.5;
      // Crack lines
      ctx.beginPath();
      ctx.moveTo(wx + win.w * 0.3, win.y);
      ctx.lineTo(wx + win.w * 0.7, win.y + win.h);
      ctx.moveTo(wx + win.w * 0.7, win.y);
      ctx.lineTo(wx + win.w * 0.2, win.y + win.h);
      ctx.stroke();
    } else if (win.dark) {
      ctx.fillStyle = 'rgba(0,2,1,.85)';
      ctx.fillRect(wx, win.y, win.w, win.h);
    } else {
      // Faintly reflective — teal-grey tint
      ctx.fillStyle = 'rgba(30,45,40,.6)';
      ctx.fillRect(wx, win.y, win.w, win.h);
      // Light reflection
      const rg = ctx.createLinearGradient(wx, win.y, wx + win.w, win.y + win.h);
      rg.addColorStop(0, 'rgba(60,90,70,.15)');
      rg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = rg;
      ctx.fillRect(wx, win.y, win.w, win.h);
    }
  });
}

function drawGround(camX) {
  const groundY = H * 0.72;

  // Road surface
  const roadGrad = ctx.createLinearGradient(0, groundY, 0, H);
  roadGrad.addColorStop(0, '#0d120d');
  roadGrad.addColorStop(0.3, '#0b0f0a');
  roadGrad.addColorStop(1, '#080c08');
  ctx.fillStyle = roadGrad;
  ctx.fillRect(0, groundY, W, H - groundY);

  // Pavement cracks
  ctx.strokeStyle = 'rgba(30,45,25,.4)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i < 12; i++) {
    const cx = (i * 150 - camX * 0.3) % (W + 100) - 50;
    ctx.beginPath();
    ctx.moveTo(cx, groundY + 5);
    ctx.lineTo(cx + 30 + Math.sin(i * 3.7) * 20, groundY + 40 + Math.sin(i * 2.1) * 20);
    ctx.lineTo(cx + 10 + Math.cos(i * 4.3) * 25, groundY + 80);
    ctx.stroke();
  }

  // Road markings — faded, overgrown
  ctx.strokeStyle = 'rgba(45,55,40,.15)';
  ctx.lineWidth = 2;
  ctx.setLineDash([40, 30]);
  ctx.beginPath();
  ctx.moveTo(-camX * 0.2 % W - W, groundY + (H - groundY) * 0.4);
  ctx.lineTo(W * 2, groundY + (H - groundY) * 0.4);
  ctx.stroke();
  ctx.setLineDash([]);

  // Debris on ground
  debris.forEach(d => {
    const dx = (d.x - camX * PARALLAX.ground + W * 2) % (W * 4) - W * 0.5;
    if (dx > W + 60 || dx + d.w < -60) return;
    ctx.save();
    ctx.translate(dx + d.w/2, d.y + d.h/2);
    ctx.rotate(d.rot);
    ctx.fillStyle = d.col;
    ctx.fillRect(-d.w/2, -d.h/2, d.w, d.h);
    ctx.restore();
  });
}

function drawGroundPlants(camX) {
  const groundY = H * 0.72;

  plants.forEach(p => {
    const px = (p.x - camX * PARALLAX.ground + W * 3) % (W * 4) - W * 0.3;
    if (px > W + 80 || px < -80) return;
    const sway = Math.sin(time * 0.6 + p.sway) * 3;

    if (p.type === 0) {
      // Tall grass blades
      for (let g = 0; g < 5; g++) {
        ctx.strokeStyle = p.col;
        ctx.lineWidth = 0.8 + g * 0.2;
        ctx.beginPath();
        ctx.moveTo(px + g * 5, p.y);
        ctx.quadraticCurveTo(
          px + g * 5 + sway + g * 2, p.y - p.size * 0.6,
          px + g * 5 + sway * 1.5, p.y - p.size
        );
        ctx.stroke();
      }
    } else if (p.type === 1) {
      // Bush
      for (let b = 0; b < 6; b++) {
        const ba = (b / 6) * Math.PI * 2;
        const br = p.size * 0.3;
        ctx.beginPath();
        ctx.arc(px + Math.cos(ba) * br + sway * 0.3, p.y - p.size * 0.4 + Math.sin(ba) * br * 0.5, p.size * 0.25, 0, Math.PI * 2);
        ctx.fillStyle = p.col;
        ctx.fill();
      }
    } else {
      // Tall weed
      ctx.strokeStyle = p.col;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(px, p.y);
      ctx.lineTo(px + sway, p.y - p.size);
      ctx.stroke();
      // Seed head
      ctx.beginPath();
      ctx.arc(px + sway, p.y - p.size, 3, 0, Math.PI * 2);
      ctx.fillStyle = p.col;
      ctx.fill();
    }
  });
}

function drawFgVines(camX) {
  // Foreground vines — large, close up
  for (let v = 0; v < 6; v++) {
    const vx = ((v * 220 - camX * PARALLAX.fg) % (W * 5) + W * 5) % (W * 5) - 100;
    if (vx > W + 200 || vx < -200) continue;
    const vl = H * 0.4 + v * 30;
    const startY = -20;

    ctx.strokeStyle = `hsla(${105+v*12},${35+v*5}%,${14+v*3}%,.55)`;
    ctx.lineWidth = 2 + v * 0.5;
    ctx.beginPath();
    ctx.moveTo(vx, startY);
    for (let s = 0; s < 12; s++) {
      const sy = startY + (s/12) * vl;
      const sx = vx + Math.sin(time * 0.35 + s * 0.7 + v * 1.5) * (8 + s * 2);
      ctx.lineTo(sx, sy);
    }
    ctx.stroke();

    // Leaves on foreground vines
    for (let l = 1; l < 10; l++) {
      const ly = startY + (l/12) * vl;
      const lx = vx + Math.sin(time * 0.35 + l * 0.7 + v * 1.5) * (8 + l * 2);
      drawLeaf(lx, ly, 6 + l * 0.8, time + v * 2 + l, 105 + v * 12);
    }
  }
}

function drawAtmosphere() {
  // Ground fog / haze
  const fogGrad = ctx.createLinearGradient(0, H * 0.65, 0, H * 0.85);
  fogGrad.addColorStop(0, 'transparent');
  fogGrad.addColorStop(0.4, 'rgba(15,25,15,.18)');
  fogGrad.addColorStop(1, 'rgba(10,16,10,.35)');
  ctx.fillStyle = fogGrad;
  ctx.fillRect(0, H * 0.65, W, H * 0.35);

  // Vignette
  const vig = ctx.createRadialGradient(W/2, H/2, H*0.2, W/2, H/2, W*0.8);
  vig.addColorStop(0, 'transparent');
  vig.addColorStop(1, 'rgba(4,7,4,.65)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, W, H);

  // Rain effect (very subtle)
  ctx.strokeStyle = 'rgba(80,110,85,.04)';
  ctx.lineWidth = 0.5;
  for (let r = 0; r < 30; r++) {
    const rx = (r * 67 + time * 40) % W;
    const ry = (r * 113 + time * 80) % H;
    ctx.beginPath();
    ctx.moveTo(rx, ry);
    ctx.lineTo(rx - 1, ry + 12);
    ctx.stroke();
  }
}

// ── AUDIO ──────────────────────────────────────────────────────────────────
function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  // Wind — filtered noise
  const bufSize = audioCtx.sampleRate * 2;
  const buffer = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;

  const windSrc = audioCtx.createBufferSource();
  windSrc.buffer = buffer;
  windSrc.loop = true;

  const windFilter = audioCtx.createBiquadFilter();
  windFilter.type = 'bandpass';
  windFilter.frequency.value = 200;
  windFilter.Q.value = 0.5;

  windGain = audioCtx.createGain();
  windGain.gain.value = 0.04;

  windSrc.connect(windFilter);
  windFilter.connect(windGain);
  windGain.connect(audioCtx.destination);
  windSrc.start();

  // Distant ambient — very low drone
  const osc = audioCtx.createOscillator();
  osc.type = 'sine';
  osc.frequency.value = 55;

  ambientGain = audioCtx.createGain();
  ambientGain.gain.value = 0;

  const lfo = audioCtx.createOscillator();
  lfo.frequency.value = 0.08;
  const lfoGain = audioCtx.createGain();
  lfoGain.gain.value = 0.015;
  lfo.connect(lfoGain);
  lfoGain.connect(ambientGain.gain);

  osc.connect(ambientGain);
  ambientGain.connect(audioCtx.destination);
  osc.start(); lfo.start();

  if (soundOn) {
    windGain.gain.value = 0.04;
    ambientGain.gain.value = 0.025;
  }
}

document.getElementById('soundBtn').addEventListener('click', function() {
  initAudio();
  soundOn = !soundOn;
  this.textContent = soundOn ? 'Sound on' : 'Sound off';
  if (audioCtx) {
    windGain && (windGain.gain.value = soundOn ? 0.04 : 0);
    ambientGain && (ambientGain.gain.value = soundOn ? 0.025 : 0);
  }
});

// ── INPUT ──────────────────────────────────────────────────────────────────
window.addEventListener('mousemove', function(e) {
  mx = e.clientX / W;
  my = e.clientY / H;
  targetScrollX = (mx - 0.5) * W * 2.5;
  targetScrollY = (my - 0.5) * H * 0.15;
});

window.addEventListener('wheel', function(e) {
  targetScrollX += e.deltaY * 1.2;
  targetScrollX = Math.max(-W * 0.1, Math.min(W * 2.2, targetScrollX));
});

// Touch
let touchStartX = 0;
window.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
window.addEventListener('touchmove', function(e) {
  const dx = touchStartX - e.touches[0].clientX;
  targetScrollX += dx * 1.5;
  targetScrollX = Math.max(-W * 0.1, Math.min(W * 2.2, targetScrollX));
  touchStartX = e.touches[0].clientX;
  e.preventDefault();
}, { passive: false });

// ── RENDER LOOP ────────────────────────────────────────────────────────────
function render() {
  time += 0.016;

  // Smooth camera
  scrollX += (targetScrollX - scrollX) * 0.06;
  scrollY += (targetScrollY - scrollY) * 0.06;

  ctx.clearRect(0, 0, W, H);

  drawSky();
  drawClouds(scrollX);
  drawBuildings(scrollX, scrollY);
  drawWindows(scrollX);
  drawGround(scrollX);
  drawGroundPlants(scrollX);
  drawFgVines(scrollX);
  drawAtmosphere();

  // Update coords UI
  const lat = (22.3193 + scrollX * 0.00003).toFixed(4);
  const lng = (114.1694 + scrollX * 0.00004).toFixed(4);
  document.getElementById('coords').innerHTML = lat + '° N<br>' + lng + '° E';

  requestAnimationFrame(render);
}

// ── INIT ───────────────────────────────────────────────────────────────────
function init() {
  resize();
  window.addEventListener('resize', resize);

  // Fake load progress
  const fill = document.getElementById('ldFill');
  const status = document.getElementById('ldStatus');
  const stages = ['Rendering city','Placing vegetation','Ageing surfaces','Raising the silence'];
  let prog = 0;
  const loader = setInterval(function() {
    prog += 3 + Math.random() * 8;
    if (prog >= 100) { prog = 100; clearInterval(loader); }
    fill.style.width = prog + '%';
    status.textContent = stages[Math.floor(prog / 28)];
    if (prog === 100) {
      setTimeout(function() {
        const ld = document.getElementById('loading');
        ld.classList.add('out');
        setTimeout(() => ld.style.display = 'none', 1600);
        render();
      }, 600);
    }
  }, 60);
}

init();
</script>
</body>
</html>
